name: Sync Migaku to Supabase

on:
  workflow_dispatch:
    inputs:
      full_refresh:
        description: "Run a full Migaku refresh"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      status:
        description: "Comma-separated Migaku statuses, or ALL"
        required: true
        default: "KNOWN,LEARNING"
  schedule:
    # GitHub schedules are UTC. Run hourly, then gate the job to
    # 08:00-midnight Europe/London so daylight saving time is handled correctly.
    - cron: "17 * * * *"

concurrency:
  group: migaku-supabase-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      MIGAKU_EMAIL: ${{ secrets.MIGAKU_EMAIL }}
      MIGAKU_REFRESH_TOKEN: ${{ secrets.MIGAKU_REFRESH_TOKEN }}
      MIGAKU_DEVICE_ID: ${{ secrets.MIGAKU_DEVICE_ID }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE || 'migaku_words' }}
      SYNC_LANG: ${{ vars.SYNC_LANG || 'zh' }}
      SYNC_STATUS: ${{ github.event.inputs.status || vars.SYNC_STATUS || 'KNOWN,LEARNING' }}
      SYNC_DIFFICULT_LIMIT: ${{ vars.SYNC_DIFFICULT_LIMIT || '2000' }}

    steps:
      - name: Check London sync window
        id: london_window
        run: |
          london_hour="$(TZ=Europe/London date +%H)"
          if [ "$london_hour" -eq 0 ] || { [ "$london_hour" -ge 8 ] && [ "$london_hour" -le 23 ]; }; then
            echo "run_sync=true" >> "$GITHUB_OUTPUT"
            echo "Within London sync window: ${london_hour}:00"
          else
            echo "run_sync=false" >> "$GITHUB_OUTPUT"
            echo "Outside London sync window: ${london_hour}:00"
          fi

      - name: Check out repository
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        run: python -m pip install -e .

      - name: Validate required secrets
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        run: |
          missing=0
          for name in MIGAKU_EMAIL MIGAKU_REFRESH_TOKEN MIGAKU_DEVICE_ID SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set"
              missing=1
            fi
          done
          exit "$missing"

      - name: Check connectivity
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        run: migaku-supabase status --lang "$SYNC_LANG"

      - name: Sync Migaku to Supabase
        if: github.event_name == 'workflow_dispatch' || steps.london_window.outputs.run_sync == 'true'
        run: |
          args=(sync --status "$SYNC_STATUS")
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.full_refresh || 'true' }}" = "true" ]; then
            args+=(--full-refresh)
          fi
          migaku-supabase "${args[@]}"
